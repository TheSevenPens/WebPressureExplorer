<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pressure Curve Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false;">

<div id="app">

  <!-- Left: Pressure curve editor -->
  <div id="curve-panel">

    <!-- Column 1: graph + copy/save + checkboxes -->
    <div id="panel-left">
      <div class="panel-title">Pressure curve explorer</div>
      <canvas id="curve-canvas"></canvas>

      <div id="chart-actions">
        <div class="dropdown-wrap">
          <button class="action-btn" id="btn-copy">Copy ▾</button>
          <div class="dropdown-menu" id="menu-copy">
            <button data-action="copy-full">Full chart</button>
            <button data-action="copy-plot">Plot area only</button>
          </div>
        </div>
        <div class="dropdown-wrap">
          <button class="action-btn" id="btn-save">Save ▾</button>
          <div class="dropdown-menu" id="menu-save">
            <button data-action="save-full">Full chart</button>
            <button data-action="save-plot">Plot area only</button>
          </div>
        </div>
      </div>

      <label class="checkbox-row">
        <input type="checkbox" id="chk-grid" checked>
        <span class="param-name">Show Grid</span>
      </label>

      <label class="checkbox-row">
        <input type="checkbox" id="chk-labels" checked>
        <span class="param-name">Show Labels</span>
      </label>

      <label class="checkbox-row">
        <input type="checkbox" id="chk-node-guides" checked>
        <span class="param-name">Show Node Guides</span>
      </label>
    </div>

    <!-- Column 2: curve type + sliders + reset -->
    <div id="panel-right">
      <div id="controls">

        <div class="param">
          <div class="param-header">
            <span class="param-name">CurveType</span>
          </div>
          <select id="select-curve-type">
            <option value="null">Null</option>
            <option value="flat">Flat</option>
            <option value="power" selected>Power</option>
            <option value="sigmoid">Sigmoid</option>
          </select>
        </div>

        <div class="param">
          <div class="param-header">
            <span class="param-name">FlatLevel</span>
            <span class="param-value" id="val-flat-level">0.50</span>
          </div>
          <input type="range" id="slider-flat-level" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div class="param">
          <div class="param-header">
            <span class="param-name">CurveAmount</span>
            <span class="param-value" id="val-softness">0.00</span>
          </div>
          <input type="range" id="slider-softness" min="-0.9" max="0.9" step="0.01" value="0">
        </div>

        <div class="param" style="display:none"><!-- Transition smoothing — hidden pending further research -->
          <div class="param-header">
            <span class="param-name">Transition</span>
            <span class="param-value" id="val-transition-width">0.00</span>
          </div>
          <input type="range" id="slider-transition-width" min="0" max="0.5" step="0.01" value="0">
        </div>

        <div class="param">
          <div class="param-header">
            <span class="param-name">InputMinimum</span>
            <span class="param-value" id="val-input-minimum">0.00</span>
          </div>
          <input type="range" id="slider-input-minimum" min="0" max="1" step="0.01" value="0">
        </div>

        <div class="param">
          <div class="param-header">
            <span class="param-name">InputMaximum</span>
            <span class="param-value" id="val-input-maximum">1.00</span>
          </div>
          <input type="range" id="slider-input-maximum" min="0" max="1" step="0.01" value="1">
        </div>

        <div class="param">
          <div class="param-header">
            <span class="param-name">OutputMinimum</span>
            <span class="param-value" id="val-minimum">0.00</span>
          </div>
          <input type="range" id="slider-minimum" min="0" max="1" step="0.01" value="0">
        </div>

        <div class="param">
          <div class="param-header">
            <span class="param-name">OutputMaximum</span>
            <span class="param-value" id="val-maximum">1.00</span>
          </div>
          <input type="range" id="slider-maximum" min="0" max="1" step="0.01" value="1">
        </div>

        <button id="btn-reset">Reset to Defaults</button>
      </div>
    </div>

  </div>

  <!-- Right: Drawing canvas -->
  <div id="draw-panel">
    <div id="toolbar">
      <button id="btn-clear">Clear</button>
      <span class="info-item">Type: <span class="val" id="val-type">---</span></span>
      <span class="info-item">
        Pressure: <span class="val" id="val-pressure-raw">---</span>
        <span class="arrow">&#8594;</span>
        <span class="val mapped" id="val-pressure-mapped">---</span>
      </span>
      <span class="info-item">Tilt X: <span class="val" id="val-tiltX">---</span></span>
      <span class="info-item">Tilt Y: <span class="val" id="val-tiltY">---</span></span>
      <span class="info-item">Azimuth: <span class="val" id="val-azimuth">---</span></span>
      <span class="info-item">Altitude: <span class="val" id="val-altitude">---</span></span>
    </div>
    <canvas id="draw-canvas"></canvas>
  </div>

</div>

<script src="params.js"></script>
<script src="curve-math.js"></script>
<script src="curve-editor.js"></script>
<script src="draw-canvas.js"></script>
<script src="controls.js"></script>
</body>
</html>
